<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Invoice - Seller</title>
   {% load static %}
  <link rel="stylesheet" href="{% static 'css/seller_create.css' %}">
  <link rel="stylesheet" href="{% static 'css/seller_create_multiple_invoice_page.css' %}">
</head>

<body>
  <div class="container">
    <!--<a style="background: black; font-size: 12px; text-decoration: none;" href="{% url 'landing' %}" class="btn-submit"> ⮜ Back </a>-->
    <h1>📄 Create Invoice</h1>
    <p class="subtitle">Fill in the details to create a new invoice</p>

    <form id="invoiceForm">
      <div class="section" id="seller-info">
        <h3>👤 Seller Information</h3>
        
        <div class="seller-content">
            <div class="seller-profile-section">
                <div class="profile-upload-area">
                    <label>Profile Picture</label>
                    <input type="file" id="sellerProfilePic" name="seller_profile_picture" accept="image/*">
                </div>
                <div class="profile-preview-area">
                    <img id="sellerPreview" class="preview-image" alt="Preview" style="display:none;">
                    <div class="no-image-placeholder" id="imagePlaceholder">
                        <span>📷</span>
                        <p>Upload Photo</p>
                    </div>
                </div>
            </div>

            <div class="seller-details-section">
                <div class="form-row">
                    <div class="form-field full-width">
                        <label for="sellerFullname">Full Name *</label>
                        <input type="text" id="sellerFullname" name="seller_fullname" placeholder="Ex: John Doe" required>
                    </div>
                </div>

                <div class="form-row two-column">
                    <div class="form-field">
                        <label for="sellerEmail">Email</label>
                        <input type="email" id="sellerEmail" name="seller_email" placeholder="example@gmail.com" required>
                    </div>
                    <div class="form-field">
                        <label for="sellerPhone">Phone</label>
                        <input type="text" id="sellerPhone" name="seller_phone" placeholder="0912-345-1477" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-field full-width">
                        <label for="sellerSocial">Social Media Handle</label>
                        <input type="text" id="sellerSocial" name="seller_social_media" placeholder="Ex: Elon Musk (FB)" required>
                    </div>
                </div>
            </div>
        </div>
      </div>

      <div class="section" id="seller-secret-key">
        <h3>🔑 Seller Secret Key</h3>
        
        <div class="secret-key-content">
            <div class="form-row two-column">
                <div class="form-field">
                    <label for="sellerSecretKey">Create Secret Key *</label>
                    <input 
                        type="password" 
                        id="sellerSecretKey" 
                        name="seller_secret_key" 
                        placeholder="At least 8 characters" 
                        required
                    >
                    <small>⚠️ Must include uppercase, lowercase, number, and special character</small>
                </div>

                <div class="form-field">
                    <label for="sellerSecretKeyConfirm">Confirm Secret Key *</label>
                    <input 
                        type="password" 
                        id="sellerSecretKeyConfirm" 
                        name="seller_secret_key_confirm" 
                        placeholder="Re-enter your secret key" 
                        required
                    >
                    <small>Re-enter your secret key to confirm</small>
                </div>
            </div>
        </div>
      </div>

      <div class="section" id="invoice-info">
        <h3>📋 Invoice Details</h3>

        <div class="invoice-content">
            <div class="form-row two-column">
                <div class="form-field">
                    <label for="invoiceDate">Invoice Date *</label>
                    <input type="date" id="invoiceDate" name="invoice_date" required>
                </div>
                <div class="form-field">
                    <label for="dueDate">Due Date</label>
                    <input type="date" id="dueDate" name="due_date">
                </div>
            </div>

            <div class="form-row" style="margin-bottom: 20px; margin-top: 20px;">
                <div class="form-field full-width">
                    <label for="description">Product/Service Name and Description *</label>
                    <textarea id="description" name="description" required placeholder="Describe the product or service..." rows="4"></textarea>
                </div>
            </div>

            <div class="form-row two-column">
                <div class="form-field">
                    <label for="quantity">Quantity *</label>
                    <input placeholder="Enter the Quantity" type="number" id="quantity" name="quantity" min="1" required>
                </div>
                <div class="form-field">
                    <label for="unitPrice">Unit Price *</label>
                    <input placeholder="Enter the Price" type="number" id="unitPrice" name="unit_price" step="0.01" min="0" required>
                </div>
            </div>

            <div class="form-row" style="margin-bottom: 20px; margin-top: 20px;">
                <div class="form-field full-width">
                    <label>Line Total</label>
                    <div class="calculated" id="lineTotal">₱0.00</div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-field full-width">
                    <label for="paymentMethod">Payment Method *</label>
                    <select id="paymentMethod" name="payment_method" required>
                        <option value="">Select Payment Method</option>
                        <option value="cash">Cash</option>
                        <option value="gcash">GCash</option>
                        <option value="bank_transfer">Bank Transfer</option>
                        <option value="other">Other</option>
                    </select>
                </div>
            </div>
        </div>
      </div>

      <div class="submit-section">
        <button type="submit" class="btn-submit" id="submitBtn">
            <span class="icon">🔗</span>
            <span class="text">Create Invoice</span>
        </button>
      </div>
    </form>

    <div class="loading-overlay" id="loading" style="display: none;">
        <div class="loading-content">
            <div class="spinner"></div>
            <p>Creating your invoice...</p>
        </div>
    </div>
  </div>

  <script type="module" src="{% static 'js/seller_create.js' %}"></script>
  <script>
      document.getElementById('sellerProfilePic').addEventListener('change', function(event) {
          const file = event.target.files[0];
          const preview = document.getElementById('sellerPreview');
          const placeholder = document.getElementById('imagePlaceholder');

          if (file) {
              const reader = new FileReader();
              reader.onload = function(e) {
                  preview.src = e.target.result;
                  preview.style.display = 'block';
                  placeholder.style.display = 'none';
              };
              reader.readAsDataURL(file);
          } else {
              preview.src = '';
              preview.style.display = 'none';
              placeholder.style.display = 'flex';
          }
      });

      function calculateTotal() {
          const quantity = parseFloat(document.getElementById('quantity').value) || 0;
          const unitPrice = parseFloat(document.getElementById('unitPrice').value) || 0;
          const total = quantity * unitPrice;
          document.getElementById('lineTotal').textContent = '₱' + total.toFixed(2);
      }

      document.getElementById('quantity').addEventListener('input', calculateTotal);
      document.getElementById('unitPrice').addEventListener('input', calculateTotal);
  </script>
</body>

</html>
